<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="240" height="240" role="img" aria-label="Bloch sphere representation of a qubit">
  <!-- sphere -->
  <circle cx="120" cy="120" r="92" fill="none" stroke="#C4B5FD" stroke-width="1.5"/>
  <!-- equator -->
  <ellipse cx="120" cy="120" rx="92" ry="34" fill="none" stroke="#C4B5FD" stroke-width="1.2" stroke-dasharray="4 4"/>
  <!-- axes -->
  <line x1="120" y1="20" x2="120" y2="220" stroke="#8E8BAD" stroke-width="1"/>
  <line x1="20" y1="120" x2="220" y2="120" stroke="#8E8BAD" stroke-width="1"/>
  <line x1="53" y1="87" x2="187" y2="153" stroke="#8E8BAD" stroke-width="1" stroke-dasharray="3 5"/>
  <!-- state vector -->
  <line x1="120" y1="120" x2="172" y2="66" stroke="#7229E8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="172" cy="66" r="5" fill="#7229E8"/>
  <!-- angle arc -->
  <path d="M120 96 A24 24 0 0 0 138 104" fill="none" stroke="#DE5471" stroke-width="1.5"/>
  <!-- labels -->
  <text x="120" y="14" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#46426E">|0⟩</text>
  <text x="120" y="236" text-anchor="middle" font-family="Inter, sans-serif" font-size="13" fill="#46426E">|1⟩</text>
  <text x="226" y="124" font-family="Inter, sans-serif" font-size="12" fill="#8E8BAD">x</text>
  <text x="180" y="60" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="#1B1840">|ψ⟩</text>
  <text x="150" y="112" font-family="Inter, sans-serif" font-size="11" fill="#DE5471">θ</text>
</svg>
